services:
  xizhou-web:
    build:
      context: .
    image: xizhou-web:local
    container_name: xizhou-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: xizhou-web-cloudflared
    restart: unless-stopped
    network_mode: host
    depends_on:
      - xizhou-web
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?set CF_TUNNEL_TOKEN in .env}
